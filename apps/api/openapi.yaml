openapi: 3.1.0
info:
  title: Kadarn Core API
  version: 0.1.0
  description: >
    Kadarn is the operating system for biospecimen and clinical data programs.
    This is the Core API — the minimal secure layer over the validated foundation.
    All endpoints require a valid Supabase JWT unless marked otherwise.
  contact:
    name: Kadarn Architecture
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://api.kadarn.io
    description: Production (future)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth JWT (obtained via sign-in)

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              example: 401
            message:
              type: string
              example: Unauthorized
            details:
              nullable: true
      required: [error]

    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
        created_by:
          type: string
          format: uuid
        visibility_scope:
          type: string
          enum: [organization, program, network, public]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        legal_name:
          type: string
          maxLength: 200
        tax_id:
          type: string
          maxLength: 50
        country:
          type: string
          default: US
          minLength: 2
          maxLength: 2
        region:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 50
        website:
          type: string
          format: uri
        description:
          type: string
          maxLength: 2000

    Program:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft, active, paused, completed, archived, cancelled]
        sponsor_org_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProgramInput:
      type: object
      required: [name, sponsor_org_id]
      properties:
        name:
          type: string
          maxLength: 200
        short_name:
          type: string
          maxLength: 20
        description:
          type: string
          maxLength: 5000
        status:
          type: string
          default: draft
          enum: [draft, active, paused, completed, archived, cancelled]
        sponsor_org_id:
          type: string
          format: uuid
        default_data_scope:
          type: string
          default: metadata_only
          enum: [no_sharing, metadata_only, aggregate_only, de_identified, pseudonymized, identified, full_access]

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        actor_id:
          type: string
          format: uuid
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
        summary:
          type: string
        created_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0
        sprint:
          type: string
          example: 1B
        timestamp:
          type: string
          format: date-time

paths:
  /health:
    get:
      summary: Health check
      description: Public endpoint — no auth required
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /me:
    get:
      summary: Get current user
      description: Returns the authenticated user's profile and memberships
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      profile:
                        type: object
                      memberships:
                        type: array

  /organizations:
    get:
      summary: List organizations
      description: Returns organizations visible to the current user (RLS enforced)
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      summary: Create organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationInput'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Organization'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Organization with this name already exists in this country

  /organizations/{id}:
    get:
      summary: Get organization by ID
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Organization'
        '404':
          description: Organization not found

  /programs:
    get:
      summary: List programs
      tags: [Programs]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of programs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Program'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      summary: Create program
      tags: [Programs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProgramInput'
      responses:
        '201':
          description: Program created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Program'
        '400':
          description: Validation error

  /programs/{id}:
    get:
      summary: Get program by ID
      tags: [Programs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Program
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Program'
        '404':
          description: Program not found

  /audit-events:
    get:
      summary: List audit events (current user only)
      tags: [Audit]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
