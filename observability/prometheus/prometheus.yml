global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: kadarn-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: kadarn-api
          environment: local
